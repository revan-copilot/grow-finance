# Docker Compose for Grow Finance FastAPI and PostgreSQL
version: '3.8'

services:
  db:
    image: postgres:15
    container_name: fastapi_db
    restart: always
    environment:
      - POSTGRES_DB=${DB_NAME:-grow_db}
      - POSTGRES_USER=${DB_USER:-grow_user}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-grow_password}
    ports:
      - "5433:5432" # Changed port to 5433 to avoid conflict with existing grow_db if running
    volumes:
      - fastapi_postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio
    container_name: fastapi_minio
    restart: always
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3-compatible API
      - "9001:9001"   # MinIO Console UI
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - fastapi_minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  minio-createbuckets:
    image: minio/mc
    container_name: fastapi_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb --ignore-existing myminio/${MINIO_BUCKET:-finance-uploads};
      echo 'Bucket created successfully';
      exit 0;
      "
    restart: on-failure

  fastapi:
    build: .
    container_name: fastapi_web
    restart: always
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
      - ./uploads:/app/uploads
    ports:
      - "8008:8000" # Changed port to 8008 to avoid conflict with existing grow_web if running
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - DB_PORT=5432 # Internal port for the db service
      - S3_ENDPOINT_URL=http://minio:9000  # Internal Docker network URL for MinIO
    depends_on:
      - db
      - minio

  adminer:
    image: adminer
    container_name: fastapi_adminer
    restart: always
    ports:
      - "8088:8080"
    # To use Adminer with PostgreSQL:
    # 1. Open http://localhost:8088
    # 2. Select 'PostgreSQL' in the 'System' dropdown
    # 3. Use 'db' as the 'Server' (not localhost:5433 or db:5433)
    # 4. Use credentials from .env (grow_user / grow_password)
    depends_on:
      - db

volumes:
  fastapi_postgres_data:
  fastapi_minio_data:
